<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circular badge background -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#6B7280" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="42" fill="#1F2937" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Ears -->
  <circle cx="28" cy="30" r="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <circle cx="72" cy="30" r="8" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <circle cx="28" cy="30" r="4" fill="#374151"/>
  <circle cx="72" cy="30" r="4" fill="#374151"/>
  <!-- Head shape - dark body -->
  <ellipse cx="50" cy="54" rx="30" ry="28" fill="#1F2937"/>
  <!-- White/silver stripe on top (signature honey badger marking) -->
  <path d="M30 30 Q50 22 70 30 L68 50 Q50 46 32 50 Z" fill="#D1D5DB"/>
  <!-- Light grey side patches -->
  <ellipse cx="50" cy="64" rx="20" ry="14" fill="#374151"/>
  <!-- Eyes - small, beady, fierce -->
  <circle cx="38" cy="48" r="5" fill="white"/>
  <circle cx="38" cy="48" r="3" fill="#1a1a2e"/>
  <circle cx="39" cy="46.5" r="1.2" fill="white"/>
  <circle cx="62" cy="48" r="5" fill="white"/>
  <circle cx="62" cy="48" r="3" fill="#1a1a2e"/>
  <circle cx="63" cy="46.5" r="1.2" fill="white"/>
  <!-- Angry brows -->
  <path d="M28 42 L43 46" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <path d="M72 42 L57 46" stroke="#111" stroke-width="3" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="50" cy="58" rx="6" ry="4" fill="#111827"/>
  <ellipse cx="50" cy="57" rx="3.5" ry="2.5" fill="#374151"/>
  <!-- Snarling mouth -->
  <path d="M36 67 Q43 63 50 67 Q57 63 64 67" stroke="#111" stroke-width="2.5" fill="none"/>
  <!-- Teeth -->
  <polygon points="40,65 42,71 44,65" fill="white"/>
  <polygon points="48,66 50,72 52,66" fill="white"/>
  <polygon points="56,65 58,71 60,65" fill="white"/>
  <!-- Claw marks on badge (fierce!) -->
  <path d="M14 72 L22 82" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M17 71 L25 81" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M20 70 L28 80" stroke="#EF4444" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
